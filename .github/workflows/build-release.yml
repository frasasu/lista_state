# .github/workflows/build-release.yml
name: Build and Release Lista State

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (optional)'
        required: false
        default: ''

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            $VERSION = "${{ github.ref_name }}" -replace 'v', ''
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VERSION"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller cython setuptools wheel
      
      - name: Generate assets.py
        run: |
          python build_assets.py
          Write-Host "assets.py generated"
      
      - name: Compile ALL Python to .pyd
        env:
          CYTHON_LIMITS: "1000000"
        run: |
          python compile.py
          Write-Host "Cython compilation completed"
      
      - name: Verify compilation
        shell: pwsh
        run: |
          Write-Host "Verifying compiled files:"
          Get-ChildItem -Path app\core_compiled -Recurse | ForEach-Object {
            $size = [math]::Round($_.Length/1KB, 2)
            Write-Host "   - $($_.Name) ($size KB)"
          }
          
          $compiledCount = (Get-ChildItem app\core_compiled -Filter *.pyd).Count
          if ($compiledCount -eq 0) {
            Write-Error "No .pyd files found in app\core_compiled"
            exit 1
          }
          
          $expectedFiles = @("executors", "lexers", "parsers", "simple_dataframe", 
                              "stats_calculator", "table_importer", "vis", "main", "assets")
          
          foreach ($file in $expectedFiles) {
            if ((Get-ChildItem app\core_compiled -Filter "$file.pyd").Count -eq 0 -and 
                (Get-ChildItem app\core_compiled -Filter "$file.so").Count -eq 0) {
              Write-Error "$file.pyd not found!"
              exit 1
            } else {
              Write-Host "   [OK] $file.pyd found"
            }
          }
          
          Write-Host "All files compiled successfully"
      
      - name: Prepare PyInstaller structure
        shell: pwsh
        run: |
          Write-Host "Preparing structure for PyInstaller..."
          
          New-Item -ItemType Directory -Force -Path dist\ListaState\app\core -ErrorAction SilentlyContinue
          
          Copy-Item -Path app\core_compiled\*.pyd -Destination dist\ListaState\app\core\ -Force
          Write-Host "   .pyd files copied"
          
          Copy-Item -Path app\loader.py -Destination dist\ListaState\app\ -Force
          Write-Host "   loader.py copied"
          
          Copy-Item -Path app\assets\monicone.ico -Destination dist\ListaState\app\assets\ -Force
          Write-Host "   icon copied"
          
          Write-Host "Structure ready for PyInstaller"
      
      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name="ListaState" `
            --windowed `
            --icon="app/assets/monicone.ico" `
            --add-data="dist\ListaState\app\core\*.pyd;app\core" `
            --add-data="app\loader.py;app" `
            --add-data="app\assets\monicone.ico;app\assets" `
            --hidden-import="Cython" `
            --hidden-import="pywebview" `
            --collect-all="pywebview" `
            --exclude-module="Cython.Compiler" `
            --exclude-module="setuptools" `
            --exclude-module="distutils" `
            run.py
          
          if (Test-Path "dist\ListaState\ListaState.exe") {
            $size = (Get-Item "dist\ListaState\ListaState.exe").Length / 1MB
            Write-Host "Executable created: $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "Failed to create executable"
            exit 1
          }
      
      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
      
      - name: Update version in Inno Setup script
        run: |
          (Get-Content installer.iss) -replace '{#VERSION}', '${{ env.VERSION }}' | Set-Content installer.iss
          Write-Host "Version updated: ${{ env.VERSION }}"
      
      - name: Create installer
        run: |
          Write-Host "Creating installer..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          
          $installer = "installer\ListaState_Setup_${{ env.VERSION }}.exe"
          if (Test-Path $installer) {
            $size = (Get-Item $installer).Length / 1MB
            Write-Host "Installer created: $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "Failed to create installer"
            exit 1
          }
      
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ListaState-Installer
          path: installer/ListaState_Setup_${{ env.VERSION }}.exe
          retention-days: 30
      
      - name: Create checksum
        run: |
          $installer = "installer\ListaState_Setup_${{ env.VERSION }}.exe"
          $hash = Get-FileHash -Algorithm SHA256 $installer
          $hash.Hash | Out-File -FilePath "$installer.sha256"
          Write-Host "Checksum created: $($hash.Hash)"
      
      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ListaState-Checksum
          path: installer/ListaState_Setup_${{ env.VERSION }}.exe.sha256
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ListaState-*
          path: artifacts
          merge-multiple: true
      
      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la artifacts/
      
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lista State ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*.exe
            artifacts/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}