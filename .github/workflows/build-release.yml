# .github/workflows/build-release.yml
name: Build and Release Lista State

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (optional)'
        required: false
        default: ''

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            $VERSION = "${{ github.ref_name }}" -replace 'v', ''
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "✅ Version: $VERSION"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --name="ListaState" --windowed --add-data="app/ui;ui" --add-data="app/core;core" app/main.py
          
          # Vérifier l'exécutable
          if (Test-Path "dist\ListaState\ListaState.exe") {
            $size = (Get-Item "dist\ListaState\ListaState.exe").Length / 1MB
            Write-Host "✅ Exécutable créé : $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "❌ Échec de la création"
            exit 1
          }
      
      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
      
      - name: Update version in Inno Setup script
        run: |
          (Get-Content installer.iss) -replace '{#VERSION}', '${{ env.VERSION }}' | Set-Content installer.iss
          Write-Host "✅ Version mise à jour: ${{ env.VERSION }}"
          Get-Content installer.iss | Select-String "AppVersion"
      
      - name: Create installer
        run: |
          Write-Host "🔨 Création de l'installateur..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          
          # Vérifier l'installateur
          $installer = "installer\ListaState_Setup_${{ env.VERSION }}.exe"
          if (Test-Path $installer) {
            $size = (Get-Item $installer).Length / 1MB
            Write-Host "✅ Installateur créé : $([math]::Round($size, 2)) MB"
          } else {
            # Chercher d'autres fichiers exe
            $files = Get-ChildItem -Path "installer" -Filter "*.exe"
            if ($files.Count -gt 0) {
              Write-Host "✅ Installateur trouvé: $($files[0].Name)"
              $installer = $files[0].FullName
            } else {
              Write-Error "❌ Échec de la création"
              exit 1
            }
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ListaState-Installer-${{ env.VERSION }}
          path: installer/*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ListaState-Installer-${{ github.ref_name }}
          path: artifacts
      
      - name: List files
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lista State ${{ github.ref_name }}
          files: artifacts/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}