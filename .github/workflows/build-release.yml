# .github/workflows/build-release.yml
name: Build and Release Lista State

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (optional)'
        required: false
        default: ''

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            $VERSION = "${{ github.ref_name }}" -replace 'v', ''
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "✅ Version: $VERSION"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka
          pip install ordered-set
          pip install zstandard
      
      - name: Download Dependency Walker
        run: |
          # Créer le dossier cache Nuitka
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.cache\nuitka"
          
          # Télécharger Dependency Walker (version 64-bit)
          $dependsUrl = "https://www.dependencywalker.com/depends22_x64.zip"
          $zipPath = "$env:USERPROFILE\.cache\nuitka\depends.zip"
          
          Write-Host "📥 Téléchargement de Dependency Walker..."
          Invoke-WebRequest -Uri $dependsUrl -OutFile $zipPath
          
          # Extraire le fichier
          Write-Host "📦 Extraction..."
          Expand-Archive -Path $zipPath -DestinationPath "$env:USERPROFILE\.cache\nuitka\" -Force
          
          # Vérifier que depends.exe est présent
          if (Test-Path "$env:USERPROFILE\.cache\nuitka\depends.exe") {
            Write-Host "✅ Dependency Walker installé avec succès"
          } else {
            Write-Host "⚠️ Dependency Walker non trouvé, tentative alternative..."
            # Alternative: utiliser le 32-bit si le 64-bit ne fonctionne pas
            $dependsUrl = "https://www.dependencywalker.com/depends22_x86.zip"
            Invoke-WebRequest -Uri $dependsUrl -OutFile $zipPath
            Expand-Archive -Path $zipPath -DestinationPath "$env:USERPROFILE\.cache\nuitka\" -Force
          }
      
      - name: Build with Nuitka
        run: |
          # Accepter automatiquement l'utilisation de Dependency Walker
          $env:NUITKA_ACCEPT_DEPENDENCY_WALKER = "1"
          
          python -m nuitka `
            --standalone `
            --windows-console-mode=disable `
            --windows-icon-from-ico="app/assets/monicone.ico" `
            --output-dir="dist" `
            --output-filename="ListaState.exe" `
            --include-package=core `
            app/main.py

          # Vérification
          if (Test-Path "dist\main.dist\ListaState.exe") {
            $size = (Get-Item "dist\main.dist\ListaState.exe").Length / 1MB
            Write-Host "✅ Exécutable créé : $([math]::Round($size, 2)) MB"

            # Afficher la structure du dossier de sortie
            Write-Host "📁 Structure du dossier de sortie:"
            Get-ChildItem "dist\main.dist" -Recurse | Select-Object FullName, Length
          } else {
            Write-Error "❌ Échec de la création"
            exit 1
          }
      
      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
      
      - name: Update version in Inno Setup script
        run: |
          (Get-Content installer.iss) -replace '{#VERSION}', '${{ env.VERSION }}' | Set-Content installer.iss
          Write-Host "✅ Version mise à jour: ${{ env.VERSION }}"
      
      - name: Create installer
        run: |
          Write-Host "🔨 Création de l'installateur..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          
          $installer = "installer\ListaState_Setup_${{ env.VERSION }}.exe"
          if (Test-Path $installer) {
            $size = (Get-Item $installer).Length / 1MB
            Write-Host "✅ Installateur créé : $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "❌ Échec de la création"
            exit 1
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ListaState-Installer
          path: installer/ListaState_Setup_${{ env.VERSION }}.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ListaState-Installer
          path: artifacts
      
      - name: List downloaded files
        run: ls -la artifacts/
      
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version : $VERSION"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lista State ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}